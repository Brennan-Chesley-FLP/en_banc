[project]
name = "en-banc"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "boto3>=1.42.39",
    "aiosqlite>=0.22.1",
    "juriscraper",
    "zstandard>=0.25.0",
    "prefect>=3.6.13",
    "prefect-aws>=0.5.0",
    "prefect-docker>=0.6.0",
    "prefect-sqlalchemy>=0.4.0",
    "pulumi>=3.218.0",
    "pulumi-aws>=6.0.0",
    "pulumi-local>=1.3.0",
    "pulumi-prefect",
    "sqlmesh[postgres]",
    "alembic>=1.13.0",
    "sqlmodel>=0.0.22",
    "eyecite>=2.6.0",
    "psycopg2-binary>=2.9.10",
    "steno[whisper]",
    "kent[persistent-driver,web]",
    "uvicorn>=0.34.0",
    "pyyaml>=6.0",
]

[dependency-groups]
docs = [
    "sphinx>=8.0",
    "sphinx-rtd-theme>=3.0",
    "sphinx-autobuild>=2024.10",
]

[tool.uv.sources]
juriscraper = { path = "../juriscraper", editable = true }
pulumi-prefect = { path = "infrastructure/sdks/prefect", editable = true }
steno = { path = "../steno", editable = true }
kent = { path = "../kent", editable = true }
