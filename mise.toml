[env]
PREFECT_API_URL = "http://localhost:4200/api"
LOCALSTACK_DATA_DIR = "./localstack"
DOCKER_HOST="unix:///var/folders/b4/0n6kw4ws2gb41m3324c37q540000gn/T/podman/podman-machine-default-api.sock"
DOCKER_HOST_SOCKET="/var/folders/b4/0n6kw4ws2gb41m3324c37q540000gn/T/podman/podman-machine-default-api.sock"
# TS_AUTHKEY = "tskey-auth-..."

[tasks.up]
description = "Start all services with Podman"
run = "cd docker && podman compose up -d"

[tasks.deploy]
description = "Deploy Prefect flows"
depends = ["up"]
run = """
uv run prefect work-pool create docker-pool --type docker 2>/dev/null || true
uv run prefect deploy --all
"""

[tasks.infra]
description = "Provision LocalStack resources and Prefect blocks/deployments with Pulumi"
depends = ["up"]
run = """
cd infrastructure
pulumi package add terraform-provider prefecthq/prefect 2>/dev/null || true
pulumi stack init dev 2>/dev/null || true
pulumi up --yes
"""
