name: en-banc-app
description: "App: S3 buckets, Prefect blocks, work pools, deployments"
runtime:
  name: python
  options:
    toolchain: uv
    root: ..
config:
  pulumi:tags:
    value:
      pulumi:template: python
  aws:region: us-east-1
  aws:endpoints:
    - s3: http://mini.bopp-justice.ts.net:7110
  aws:accessKey: minioadmin
  aws:secretKey: minioadmin
  aws:s3UsePathStyle: true
  aws:skipCredentialsValidation: true
  aws:skipRequestingAccountId: true
  prefect:endpoint: http://localhost:7100/api
