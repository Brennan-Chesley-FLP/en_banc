name: en-banc
runtime:
  name: python
  options:
    toolchain: uv
config:
  # Prefect API the pulumi-prefect provider talks to.
  prefect:endpoint: http://localhost:4200/api
  # SeaweedFS S3 gateway. Override per-stack; secret key should be set with
  #   pulumi config set --secret en-banc:s3SecretKey <value>
  en-banc:s3Endpoint: http://mini.bopp-justice.ts.net:8333
  en-banc:s3AccessKey: en-banc
  en-banc:s3SecretKey: en-banc-secret
  # Max simultaneous runs per JKent scraper (one global limit is created per
  # discovered scraper).
  en-banc:scraperConcurrency: "1"
